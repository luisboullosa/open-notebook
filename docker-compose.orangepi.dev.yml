# Orange Pi dev compose (LAN-friendly bindings)
# Based on docker-compose.dev.yml but adapted to bind services to 0.0.0.0

name: open-notebook-dev

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:4444:4444"
      - "0.0.0.0:8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile.lan:/etc/caddy/Caddyfile:ro
      - ./letsencrypt:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      open_notebook:
        condition: service_started
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:v2
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    pull_policy: always
    user: root
    restart: always
  
  # llama-server chat & embedding run as native systemd services on the host.
  # See scripts/llama_setup.sh to install them.
  # Chat:      http://host.docker.internal:8081  (gemma-3-1b-it)
  # Embedding: http://host.docker.internal:8082  (mxbai-embed-large)
  
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    ports:
      - "0.0.0.0:9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-models:/root/.cache/whisper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  whisper-openai-adapter:
    image: python:3.11-slim
    container_name: whisper-openai-adapter
    working_dir: /app
    environment:
      - WHISPER_BASE_URL=http://whisper:9000
      - WHISPER_ASR_PATH=/asr
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app:app --host 0.0.0.0 --port 9100"
    volumes:
      - ./scripts/whisper_openai_adapter:/app:ro
    depends_on:
      whisper:
        condition: service_started
    ports:
      - "0.0.0.0:9100:9100"
    restart: unless-stopped

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    ports:
      - "0.0.0.0:8969:8000"
    volumes:
      - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    restart: unless-stopped

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    ports:
      - "0.0.0.0:8080:8080"  # Accessible from LAN (proxied via Caddy /stirling)
    restart: unless-stopped

  service-navigator:
    image: nginx:alpine
    ports:
      - "8090:80"  # Landing page for all services
    volumes:
      - ./setup_guide/service-navigator/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
  
  open_notebook:
    image: lfnovo/open_notebook:v1-latest-single
    ports:
      - "127.0.0.1:8502:8502"
      - "127.0.0.1:5055:5055"
    env_file:
      - ./docker.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      surrealdb:
        condition: service_started
      whisper:
        condition: service_started
      whisper-openai-adapter:
        condition: service_started
      speaches:
        condition: service_started
    volumes:
      - ./notebook_data:/app/data
    environment:
      - API_URL=https://192.168.2.129
      - SURREAL_URL=ws://surrealdb:8000
      # rk-llama.cpp via openai-compatible provider (native host services)
      - OPENAI_COMPATIBLE_BASE_URL_LLM=http://host.docker.internal:8081/v1
      - OPENAI_COMPATIBLE_BASE_URL_EMBEDDING=http://host.docker.internal:8082/v1
      - OPENAI_COMPATIBLE_BASE_URL_STT=http://whisper-openai-adapter:9100/v1
      - OPENAI_COMPATIBLE_BASE_URL_TTS=http://speaches:8000/v1
      - OPENAI_COMPATIBLE_API_KEY=not-required
      - WHISPER_API_URL=http://whisper:9000
      - WATCHFILES_FORCE_POLLING=false
    restart: always
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]

volumes:
  caddy_data:
  caddy_config:
  whisper-models:
  hf-hub-cache:
