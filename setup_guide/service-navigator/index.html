<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Notebook Services</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f7f7f9; color: #111; }
    h1 { margin-bottom: 0.3rem; }
    p { color: #444; }
    ul { list-style: none; padding: 0; max-width: 700px; }
    li { background: #fff; margin: 0.5rem 0; padding: 0.8rem 1rem; border: 1px solid #ddd; border-radius: 8px; }
    a { text-decoration: none; font-weight: 600; color: #0b57d0; }
    .muted { font-size: 0.9rem; color: #666; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <h1>Open Notebook Service Navigator</h1>
  <p>Use this page when you don’t remember the exact service URL.</p>
  <ul id="links"></ul>

  <script>
    const host = window.location.hostname || 'localhost';
    const services = [
      { name: 'Open Notebook UI', port: 8502, note: 'Main app' },
      { name: 'Open Notebook API', port: 5055, note: 'REST API' },
      { name: 'Stirling PDF', port: 8080, note: 'PDF tools' },
      { name: 'Ollama', port: 11435, note: 'Model server (container)' },
      { name: 'Whisper', port: 9000, note: 'Speech-to-text' },
      { name: 'Piper', port: 10200, note: 'Text-to-speech' }
    ];

    const list = document.getElementById('links');
    services.forEach((service) => {
      const url = `http://${host}:${service.port}`;
      const li = document.createElement('li');
      li.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${service.name}</a><span class="muted">${url} · ${service.note}</span>`;
      list.appendChild(li);
    });
  </script>
</body>
</html>
