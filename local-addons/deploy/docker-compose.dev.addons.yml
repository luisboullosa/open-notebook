services:
  cdisc_frontend:
    build:
      context: ./local-addons/cdisc
      dockerfile: Dockerfile
    ports:
      - "3005:80"
    restart: always
    depends_on:
      - open_notebook

  cdisc_api:
    build:
      context: ./local-addons/cdisc/api
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE=http://host.docker.internal:11435
    restart: unless-stopped
    depends_on:
      - caddy

  caddy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:4444:4444"
      - "0.0.0.0:8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./local-addons/deploy/Caddyfile.lan.cdisc:/etc/caddy/Caddyfile:ro
      - ./letsencrypt:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - open_notebook
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: